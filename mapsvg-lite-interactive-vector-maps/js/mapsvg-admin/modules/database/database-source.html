<script type="text/x-handlebars-template" data-name="toolbar">
  <div id="mapsvg-data-toolbar">
    <div class="row">
      <div class="col-sm-5">
        <ul class="nav nav-pills" id="mapsvg-source-menu-left">
          <li role="presentation" class="nav-item">
            <a
              id="mapsvg-btn-add-datasource"
              href="#"
              class="nav-link toggle-tooltip"
              title="Add source"
            >
              <i class="bi bi-plus-lg"></i>
            </a>
          </li>
        </ul>
      </div>
      <div class="mapsvg-toolbar-title col-sm-3">
        Data&nbsp;Sources
      </div>

      <div class="mapsvg-toolbar-buttons col-sm-4">
        <ul class="nav nav-pills pull-right" id="mapsvg-source-menu-right" class="pull-right">
          <li role="presentation">
            <a href="#" id="mapsvg-go-to-table" class="nav-link toggle-tooltip" title="Table">
              <i class="bi bi-chevron-right"></i>
            </a>
          </li>
        </ul>
      </div>
    </div>
    <div class="mapsvg-toolbar-filters"></div>
  </div>
</script>

<script type="text/x-handlebars-template" data-name="main">

  <table class="table mapsvg-data-list-table" id="mapsvg-data-list-table">
    <thead>
    <tr>
      <!--<th>id</th>-->
      <!--<th>Title</th>-->
      <th>Table name</th>
      <th style="width: 128px;"></th>
    </tr>
    </thead>
    <tbody>
    {{#each schemas}}
      {{>databaseSourceItemPartial params=this defaultTable=../defaultTable}}
    {{/each}}
    </tbody>
  </table>
</script>

<script type="text/x-handlebars-template" data-name="item" data-partial="true">
  <tr id="mapsvg-datasource-{{params.id}}" data-id="{{params.id}}" class="mapsvg-data-row">
      <!--<td>-->
      <!--{{params.id}}-->
      <!--</td>-->
      <!--<td>-->
      <!--{{#if params.title}}params.title{{else}}{{params.name}}{{/if}}-->
      <!--</td>-->
      <td>
          {{#if params.title}}{{params.title}}{{else}}{{params.name}}{{/if}}
      </td>
      <td class="text-nowrap text-end">
        <button
          type="button"
          class="btn btn-sm btn-outline-secondary toggle-tooltip"
          title="Edit"
          data-action="edit-data-source"
          data-table-name="{{params.name}}"
          data-schema-id="{{params.id}}"
        >
          <i class="bi bi-pencil"></i>
        </button>
        {{#ifeq defaultTable params.name}}
          <button
            type="button"
            class="btn btn-sm btn-secondary toggle-tooltip"
            title="Connected"
            disabled
          >
            <i class="bi bi-check-lg"></i>
          </button>
        {{/ifeq}}
        {{#ifnoteq defaultTable params.name}}
          <button
            type="button"
            class="btn btn-sm btn-outline-secondary toggle-tooltip"
            title="Connect"
            data-action="set-data-source"
            data-table-name="{{params.name}}"
            data-schema-id="{{params.id}}"
          >
            <i class="bi bi-plug"></i>
          </button>
        {{/ifnoteq}}
        {{#ifeq params.type "region"}}
          <button
            type="button"
            class="btn btn-sm btn-outline-secondary toggle-tooltip"
            title="Region data sources cannot be deleted"
            disabled
          >
            <i class="bi bi-trash"></i>
          </button>
        {{/ifeq}}
        {{#ifnoteq params.type "region"}}
          {{#ifeq defaultTable params.name}}
            <button
              type="button"
              class="btn btn-sm btn-outline-secondary toggle-tooltip"
              title="Disconnect the data source before deleting"
              disabled
            >
              <i class="bi bi-trash"></i>
            </button>
          {{/ifeq}}
          {{#ifnoteq defaultTable params.name}}
            <button
              type="button"
              class="btn btn-sm btn-outline-secondary toggle-tooltip"
              title="Delete"
              data-action="delete-data-source"
              data-table-name="{{params.name}}"
              data-schema-id="{{params.id}}"
            >
              <i class="bi bi-trash"></i>
            </button>
          {{/ifnoteq}}
        {{/ifnoteq}}
      </td>
  </tr>
</script>
