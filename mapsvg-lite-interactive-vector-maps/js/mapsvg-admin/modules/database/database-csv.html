<script type="text/x-handlebars-template" data-name="main">
  <div class="mapsvg-view-padding">{{{premiumFeatureAlert}}}</div>
  <form class="mapsvg-view-padding">
    <div class="form-group row mb-3">
      <label class="col-md-3 col-form-label">
        File
      </label>
      <div class="col-md-9">
        <input id="mapsvg-csv-file" class="form-control" type="file" />
      </div>
    </div>

    <div class="form-group row">
      <label class="col-md-3 col-form-label">
        Use Google Geocoding API
      </label>
      <div class="col-md-9">
        <div class="form-switch form-switch-md">
          <input
            id="use-geocoding"
            type="checkbox"
            class="form-check-input"
            name="use_geocoding"
            disabled="disabled"
          />
        </div>
      </div>
    </div>

    <div id="csv-geocoding-options" style="display: none;">
      <div class="form-group row mb-3">
        <div class="col-md-3"></div>
        <div class="col-md-9">
          <div class="form-check mb-2">
            <input
              id="opt-latlng-to-address"
              type="checkbox"
              class="form-check-input"
              name="convert_latlng_to_address"
              checked
            />
            <label for="opt-latlng-to-address" class="form-check-label">
              Convert
              <em>
                lat,lng
              </em>
              coordinates in the
              <em>
                "location"
              </em>
              column to addresses
            </label>
          </div>

          <div class="form-check mb-3">
            <input
              id="opt-address-to-latlng"
              type="checkbox"
              class="form-check-input"
              name="convert_address_to_latlng"
              checked
            />
            <label for="opt-address-to-latlng" class="form-check-label">
              Convert address strings in the
              <em>
                "location"
              </em>
              column to
              <em>
                lat,lng
              </em>
              coordinates
            </label>
          </div>

          <div class="form-check mb-3">
            <input
              id="opt-paid-geocoding"
              type="checkbox"
              class="form-check-input"
              name="paid_geocoding"
            />
            <label for="opt-paid-geocoding" class="form-check-label">
              I'm willing to pay for the Geocoding API to make it faster
            </label>
          </div>

          <p class="form-text mb-2">
            Google Geocoding API converts between coordinates and human-readable addresses. Enable
            the options above based on what your CSV contains. Geocoding runs in the background
            after upload — you can safely leave this page.
          </p>

          <div class="alert alert-info mb-0" style="font-size: 13px;">
            <strong>
              Google Geocoding API quota
            </strong>
            <br />
            <span id="geocoding-quota-free">
              Free tier:
              <strong>
                ~1,300 requests/day
              </strong>
              (40,000/month).
              <br />
              If your CSV has more than 1,300 rows needing geocoding, it will be spread over
              multiple days — geocoding pauses automatically when the daily limit is reached and
              resumes the next day (UTC).
              <br />
              This budget is shared with live address searches on all your maps.
            </span>
            <span id="geocoding-quota-paid" style="display:none;">
              Paid tier: geocoding runs
              <strong>
                as fast as possible
              </strong>
              with no daily cap.
              <br />
              You will be charged by Google based on your usage (
              <a href="https://mapsplatform.google.com/pricing/" target="_blank">
                see pricing
              </a>
              ). The $200/month free credit (~40,000 requests) still applies before charges begin.
              <br />
              This budget is shared with live address searches on all your maps.
            </span>
          </div>
        </div>
      </div>
    </div>

    <div class="form-group row mb-3">
      <label class="col-md-3 col-form-label"></label>
      <div class="col-md-9">
        <button
          disabled="disabled"
          data-loading-text="Uploading..."
          class="btn btn-outline-secondary"
          id="mapsvg-btn-csv-upload"
        >Upload
        </button>
      </div>
    </div>
  </form>
  <div class="mapsvg-view-padding">
    <h3>
      Instructions
    </h3>
    <p>
      Before importing, create all fields in
      <code>
        <i class="bi bi-database"></i>
        Database &gt; Edit fields
      </code>
      . The first row of the CSV must contain field names matching your MapSVG schema exactly.
    </p>
    <p>
      If you import a
      <code>
        Location
      </code>
      field, first set the address language in
      <code>
        <i class="bi bi-database"></i>
        Database &gt; Edit fields &gt; Location &gt; Language
      </code>
      .
    </p>
    <p>
      <a
        href="https://docs.google.com/spreadsheets/d/1OFATRH7-FkcGUPO_HHfM_5K51HVlzfFwq9NMoOjaXrU/edit?usp=sharing"
        target="_blank"
        class="btn btn-sm btn-outline-primary"
      >
        <i class="bi bi-table"></i>
        Open example spreadsheet
      </a>
    </p>
    <h3>
      CSV field format reference
    </h3>
    <table style="width: 100%;" class="table table-bordered table-sm">
      <thead class="table-light">
        <tr>
          <th style="width: 150px;">
            Field type
          </th>
          <th style="width: 200px;">
            Example value
          </th>
          <th>
            Notes
          </th>
        </tr>
      </thead>
      <tbody>
        <!-- TEXT -->
        <tr>
          <td>
            <code>
              Text
            </code>
          </td>
          <td>
            Coffee Roasters
          </td>
          <td>
            Stored as-is. No special formatting required.
          </td>
        </tr>
        <!-- NUMBER -->
        <tr>
          <td>
            <code>
              Number
            </code>
          </td>
          <td>
            4.5
          </td>
          <td>
            Integer or decimal. Stored as-is.
          </td>
        </tr>
        <!-- SELECT / RADIO / STATUS -->
        <tr>
          <td rowspan="3">
            <code>
              Select, Radio, Status
            </code>
          </td>
          <td>
            <code>
              1
            </code>
          </td>
          <td>
            Option
            <strong>
              value
            </strong>
            — stored directly.
          </td>
        </tr>
        <tr>
          <td>
            <code>
              North
            </code>
          </td>
          <td>
            Option
            <strong>
              label
            </strong>
            — resolved to the matching value automatically.
          </td>
        </tr>
        <tr>
          <td>
            <s>
              South-West
            </s>
          </td>
          <td>
            ❌ Invalid — must match an existing option value or label exactly.
          </td>
        </tr>
        <!-- SELECT MULTISELECT -->
        <tr>
          <td rowspan="2">
            <code>
              Select (multiselect)
            </code>
          </td>
          <td>
            <code>
              Coffee,Tea
            </code>
          </td>
          <td>
            Comma-separated list. Each token matched by value or label.
          </td>
        </tr>
        <tr>
          <td>
            <code>
              Beer
            </code>
          </td>
          <td>
            Single value.
          </td>
        </tr>
        <!-- CHECKBOXES -->
        <tr>
          <td rowspan="2">
            <code>
              Checkboxes
            </code>
          </td>
          <td>
            <code>
              Wifi,Parking
            </code>
          </td>
          <td>
            Comma-separated list. Each token matched by value or label.
          </td>
        </tr>
        <tr>
          <td>
            <code>
              Wifi
            </code>
          </td>
          <td>
            Single value.
          </td>
        </tr>
        <!-- CHECKBOX -->
        <tr>
          <td rowspan="4">
            <code>
              Checkbox
            </code>
          </td>
          <td>
            <code>
              1
            </code>
          </td>
          <td>
            Checked.
          </td>
        </tr>
        <tr>
          <td>
            <code>
              0
            </code>
          </td>
          <td>
            Unchecked.
          </td>
        </tr>
        <tr>
          <td>
            <code>
              true
            </code>
          </td>
          <td>
            Checked (text form).
          </td>
        </tr>
        <tr>
          <td>
            <code>
              false
            </code>
          </td>
          <td>
            Unchecked (text form).
          </td>
        </tr>
        <!-- LOCATION -->
        <tr>
          <td rowspan="4">
            <code>
              Location
            </code>
          </td>
          <td>
            <code>
              40.7128,-74.0060
            </code>
          </td>
          <td>
            lat,lng coordinates. Valid range: ±90 lat, ±180 lng.
          </td>
        </tr>
        <tr>
          <td>
            <code>
              Paris
            </code>
          </td>
          <td>
            Address — geocoded to coordinates if Google Geocoding API is enabled (~1,300 free
            requests/day, runs in the background).
          </td>
        </tr>
        <tr>
          <td>
            <code>
              Main st. 1, New York, USA
            </code>
          </td>
          <td>
            Address with commas — also accepted.
          </td>
        </tr>
        <tr>
          <td>
            <s>
              99.1211,199.2323
            </s>
          </td>
          <td>
            ❌ Invalid — coordinates outside the valid range.
          </td>
        </tr>
        <!-- REGIONS -->
        <tr>
          <td rowspan="3">
            <code>
              Regions
            </code>
          </td>
          <td>
            <code>
              US-TX
            </code>
          </td>
          <td>
            Single region ID.
          </td>
        </tr>
        <tr>
          <td>
            <code>
              US-TX,US-AL,US-NY
            </code>
          </td>
          <td>
            Multiple region IDs — comma-separated.
          </td>
        </tr>
        <tr>
          <td>
            <s>
              US-TX US-AL US-NY
            </s>
          </td>
          <td>
            ❌ Invalid — use commas, not spaces, as separator.
          </td>
        </tr>
        <!-- POST -->
        <tr>
          <td rowspan="2">
            <code>
              Post
            </code>
          </td>
          <td>
            <code>
              42
            </code>
          </td>
          <td>
            WordPress post ID — verified to exist before storing.
          </td>
        </tr>
        <tr>
          <td>
            <code>
              my-post-slug
            </code>
          </td>
          <td>
            Post slug — automatically resolved to the post ID.
          </td>
        </tr>
        <!-- DATE / DATETIME -->
        <tr>
          <td rowspan="2">
            <code>
              Date / Datetime
            </code>
          </td>
          <td>
            <code>
              2024-06-15
            </code>
          </td>
          <td>
            Date only (YYYY-MM-DD).
          </td>
        </tr>
        <tr>
          <td>
            <code>
              2024-06-15 14:30:00
            </code>
          </td>
          <td>
            Date and time (YYYY-MM-DD HH:MM:SS).
          </td>
        </tr>
        <!-- IMAGE -->
        <tr>
          <td rowspan="2">
            <code>
              Image
            </code>
          </td>
          <td>
            <code>
              https://example.com/photo.jpg
            </code>
          </td>
          <td>
            Single remote image URL. Downloaded and added to the WordPress Media Library
            automatically. The same URL is never downloaded twice.
          </td>
        </tr>
        <tr>
          <td>
            <code>
              https://example.com/a.jpg,
              <br />
              https://example.com/b.jpg
            </code>
          </td>
          <td>
            Multiple images — comma-separated URLs.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</script>
