<script type="text/x-handlebars-template" data-name="main">
  <div class="mapsvg-view-padding">{{{premiumFeatureAlert}}}</div>
  <form class="mapsvg-view-padding">
    <div class="form-group row mb-3">
      <label class="col-md-3 col-form-label">
        File
      </label>
      <div class="col-md-9">
        <input id="mapsvg-r-csv-file" class="form-control" type="file" />
      </div>
    </div>
    <div class="form-group row mb-3">
      <label class="col-md-3 col-form-label"></label>
      <div class="col-md-9">
        <button 
                data-loading-text="Uploading..." 
                class="btn btn-outline-secondary" 
                id="mapsvg-btn-r-csv-upload"                
                disabled="disabled"
                >Upload
                </button>
      </div>
    </div>
  </form>
  <div class="mapsvg-view-padding">
    <h3>
      Instructions
    </h3>
    <p>
      The first row of the CSV must contain field names matching the region properties exactly (e.g.
      <code>
        id
      </code>
      ,
      <code>
        title
      </code>
      ,
      <code>
        description
      </code>
      , and any custom fields).
    </p>
    <p>
      <a
        href="https://docs.google.com/spreadsheets/d/1gNXQqw1EH6u6q4LJPOcDcoYYrJJ-HrmCGLoGgv1qEfo/edit?usp=sharing"
        target="_blank"
        class="btn btn-sm btn-outline-primary"
      >
        <i class="bi bi-table"></i>
        Open example spreadsheet
      </a>
    </p>
    <h3>
      CSV field format reference
    </h3>
    <table style="width: 100%;" class="table table-bordered table-sm">
      <thead class="table-light">
        <tr>
          <th style="width: 150px;">
            Field type
          </th>
          <th style="width: 200px;">
            Example value
          </th>
          <th>
            Notes
          </th>
        </tr>
      </thead>
      <tbody>
        <!-- ID -->
        <tr>
          <td>
            <code>
              Text
            </code>
          </td>
          <td>
            US-TX
          </td>
          <td>
            Region ID — must match the SVG region ID exactly. Used to identify which region to
            update.
          </td>
        </tr>
        <!-- TITLE -->
        <tr>
          <td>
            <code>
              Text
            </code>
          </td>
          <td>
            Texas
          </td>
          <td>
            Display name shown in popups and tooltips.
          </td>
        </tr>
        <!-- DESCRIPTION -->
        <tr>
          <td>
            <code>
              Text
            </code>
          </td>
          <td>
            Large state, known for BBQ
          </td>
          <td>
            Plain text.
          </td>
        </tr>
        <!-- SELECT / RADIO / STATUS -->
        <tr>
          <td rowspan="3">
            <code>
              Select, Radio, Status
            </code>
          </td>
          <td>
            <code>
              1
            </code>
          </td>
          <td>
            Option
            <strong>
              value
            </strong>
            — stored directly.
          </td>
        </tr>
        <tr>
          <td>
            <code>
              North
            </code>
          </td>
          <td>
            Option
            <strong>
              label
            </strong>
            — resolved to the matching value automatically.
          </td>
        </tr>
        <tr>
          <td>
            <s>
              South-West
            </s>
          </td>
          <td>
            ❌ Invalid — must match an existing option value or label exactly.
          </td>
        </tr>
        <!-- CHECKBOXES -->
        <tr>
          <td rowspan="2">
            <code>
              Checkboxes
            </code>
          </td>
          <td>
            <code>
              Wifi,Parking
            </code>
          </td>
          <td>
            Comma-separated list. Matched by value or label.
          </td>
        </tr>
        <tr>
          <td>
            <code>
              Wifi
            </code>
          </td>
          <td>
            Single value.
          </td>
        </tr>
        <!-- CHECKBOX -->
        <tr>
          <td rowspan="4">
            <code>
              Checkbox
            </code>
          </td>
          <td>
            <code>
              1
            </code>
          </td>
          <td>
            Checked.
          </td>
        </tr>
        <tr>
          <td>
            <code>
              0
            </code>
          </td>
          <td>
            Unchecked.
          </td>
        </tr>
        <tr>
          <td>
            <code>
              true
            </code>
          </td>
          <td>
            Checked (text form).
          </td>
        </tr>
        <tr>
          <td>
            <code>
              false
            </code>
          </td>
          <td>
            Unchecked (text form).
          </td>
        </tr>
        <!-- DATE / DATETIME -->
        <tr>
          <td rowspan="2">
            <code>
              Date / Datetime
            </code>
          </td>
          <td>
            <code>
              2024-06-15
            </code>
          </td>
          <td>
            Date only (YYYY-MM-DD).
          </td>
        </tr>
        <tr>
          <td>
            <code>
              2024-06-15 14:30:00
            </code>
          </td>
          <td>
            Date and time (YYYY-MM-DD HH:MM:SS).
          </td>
        </tr>
        <!-- IMAGE -->
        <tr>
          <td rowspan="2">
            <code>
              Image
            </code>
          </td>
          <td>
            <code>
              https://example.com/photo.jpg
            </code>
          </td>
          <td>
            Single remote image URL. Downloaded and added to the WordPress Media Library
            automatically. The same URL is never downloaded twice.
          </td>
        </tr>
        <tr>
          <td>
            <code>
              https://example.com/a.jpg,
              <br />
              https://example.com/b.jpg
            </code>
          </td>
          <td>
            Multiple images — comma-separated URLs.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</script>
